<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NALAKA LMS</title>
    <script>
      const path = window.location.pathname.replace(/^\/lms/, '')
      const search = window.location.search || ''
      const hash = window.location.hash || ''
      const target = `/lms/?redirect=${encodeURIComponent(path + search + hash)}`
      window.location.replace(target)
    </script>
  </head>
  <body></body>
</html>
